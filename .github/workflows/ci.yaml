name: CI

on: push

jobs:
  linting:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v3
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: run flake8
        run: |
          flake8 app.py
  Unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v3
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: run unit tests
        run: |
          pytest test.py